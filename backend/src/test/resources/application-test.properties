spring.application.name=gestor-inversores-test

# --- Configuraciones de Seguridad (Test) ---
spring.security.user.name=admin
spring.security.user.password=password

# --- Configuraciones de BD (H2) ---
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# --- Configuraciones de JWT (Test) ---
# Clave debe ser lo suficientemente larga si usas algoritmos como HS256
security.jwt.private.key=test_secret_key_12345678901234567890123456789012
security.jwt.user.generator=test_user_generator

# --- Configuración de Mail (Test - Mock) ---
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# --- API Keys Externas (Test - Mock) ---
exchangerate.api.key=test_exchange_key
# Corregido: la propiedad que espera el bean es gemini.api.key, no google.gemini.api-key
gemini.api.key=test_gemini_key

# --- Archivos ---
app.upload.dir=target/uploads/
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
